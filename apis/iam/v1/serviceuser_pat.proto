syntax = "proto3";
package iam.v1;

option go_package = "github.com/Mattilsynet/mapis/gen/go/iam/v1;iamv1";

// ServiceUserPATRequest is the internal bridge request from iam-serviceuser
// to zitadel-sync for listing/creating service-user personal access tokens.
message ServiceUserPATRequest {
  string action = 1;
  string service_user = 2;
  string service_uid = 3;
  string service_fqrn = 4;
  string zitadel_id = 5;
  string bridge_token = 6;
  string expiration_at = 7;
  string token_id = 8;
}

message ServiceUserPATItem {
  string id = 1;
  string created_at = 2;
  string expires_at = 3;
  string user_id = 4;
  string organization_id = 5;
  bool revoked = 6;
  string revoked_at = 7;
  string reconcile_error = 8;
  string pending_action = 9;
}

message ServiceUserPATResponse {
  bool success = 1;
  string error = 2;
  string message = 3;
  string token = 4;
  string token_id = 5;
  repeated ServiceUserPATItem items = 6;
}

// PIPLookupRequest is the authorization lookup payload from CQRS to authz PIP.
message PIPLookupRequest {
  string principal = 1;
  string org = 2;
  string token_id = 3;
}

// PIPLookupResponse returns authorization grants for a principal.
message PIPLookupResponse {
  bool allowed = 1;
  string reason = 2;
  repeated string grants = 3;
  repeated string groups = 4;
}

// AuthIntrospectionRequest is the request payload for token introspection
// over auth subjects (e.g. zitadel.auth).
message AuthIntrospectionRequest {
  string token = 1;
  repeated string required_roles = 2;
}

// AuthIntrospectionResponse is the normalized auth response payload used by
// CQRS and IAM modules.
message AuthIntrospectionResponse {
  bool allowed = 1;
  string principal = 2;
  string username = 3;
  string user_id = 4;
  string organization_id = 5;
  string token_id = 6;
  int64 expires_at = 7;
  string error = 8;
  string message = 9;
}

// CQRSPrincipalSessionCacheEntry is the protobuf cache value for opaque PAT
// principal resolution in CQRS.
message CQRSPrincipalSessionCacheEntry {
  string principal = 1;
  string org = 2;
  string token_id = 3;
  int64 cached_unix = 4;
  int64 expires_unix = 5;
  string source = 6;
  bool negative = 7;
  string reason = 8;
}
