syntax = "proto3";
package iam.v1;

import "buf/validate/validate.proto";
import "meta/v1/meta.proto";
import "status/v1/status.proto";

option go_package = "github.com/Mattilsynet/mapis/gen/iam/v1;iamv1";

// Group - platform-only collection of users (NOT synced to ZITADEL)
// Groups are expanded during policy sync to ZITADEL
// metadata.name = group name
message Group {
  meta.v1.TypeMeta type = 1;
  meta.v1.ObjectMeta metadata = 2;  // name = group_name
  GroupSpec spec = 20;
  GroupStatus status = 30;
}

message GroupSpec {
  // name - group name (matches metadata.name)
  string name = 1 [(buf.validate.field).string.min_len = 1];

  // description - human-readable description
  string description = 2;

  // members - user email addresses only (service accounts cannot be members)
  // Format: plain email address (e.g., "user@example.com")
  // NOTE: Groups CANNOT contain other groups
  // NOTE: Service accounts are NOT allowed in groups
  repeated string members = 10 [
    (buf.validate.field).string.min_len = 1,
    (buf.validate.field).string.email = true
  ];

  // external_id - external reference (if needed)
  string external_id = 20;
}

message GroupStatus {
  status.v1.Status status = 20;
}

message GroupList {
  repeated Group items = 1;
}
