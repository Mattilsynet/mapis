syntax = "proto3";
package iam.v1;

import "buf/validate/validate.proto";
import "meta/v1/meta.proto";
import "status/v1/status.proto";

option go_package = "github.com/Mattilsynet/mapis/gen/iam/v1;iamv1";

// Role - defines a set of permissions (flat namespace)
// Roles are granted via Policy bindings
// metadata.name = role name
message Role {
  meta.v1.TypeMeta type = 1;
  meta.v1.ObjectMeta metadata = 2;  // name = role_name
  RoleSpec spec = 20;
  RoleStatus status = 30;
}

message RoleSpec {
  // name - role name (matches metadata.name)
  string name = 1 [(buf.validate.field).string.min_len = 1];

  // description - human-readable description
  string description = 2;

  // permissions - list of permission strings
  // Format: resource:action (e.g., "projects:read", "secrets:write")
  repeated string permissions = 10 [(buf.validate.field).string.min_len = 1];

  // external_id - ZITADEL role ID (populated during sync)
  string external_id = 20;

  // is_builtin - if true, this is a system-provided role
  bool is_builtin = 30;
}

message RoleStatus {
  status.v1.Status status = 20;
}

message RoleList {
  repeated Role items = 1;
}
