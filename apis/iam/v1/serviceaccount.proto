syntax = "proto3";
package iam.v1;

import "buf/validate/validate.proto";
import "meta/v1/meta.proto";
import "status/v1/status.proto";

option go_package = "github.com/Mattilsynet/mapis/gen/iam/v1;iamv1";

// ServiceAccount - represents a service account for programmatic access
// metadata.name = service account ID
message ServiceAccount {
  meta.v1.TypeMeta type = 1;
  meta.v1.ObjectMeta metadata = 2;  // name = sa_id
  ServiceAccountSpec spec = 20;
  ServiceAccountStatus status = 30;
}

message ServiceAccountSpec {
  // sa_id - service account ID (matches metadata.name)
  string sa_id = 1 [(buf.validate.field).string.min_len = 1];

  // name - display name
  string name = 2 [(buf.validate.field).string.min_len = 1];

  // description - human-readable description
  string description = 3;

  // external_id - ZITADEL user ID (populated during sync)
  string external_id = 20;
}

message ServiceAccountStatus {
  status.v1.Status status = 20;
}

message ServiceAccountList {
  repeated ServiceAccount items = 1;
}
